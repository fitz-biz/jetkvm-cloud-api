name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/jetkvm/cloud-api.git || true
          git fetch upstream main

      - name: Check for changes
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

      - name: Create sync branch and PR
        if: steps.check.outputs.behind > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync-upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true
          git push origin "$BRANCH"
          gh pr create \
            --title "Sync upstream $(date +%Y-%m-%d)" \
            --body "Automated sync from jetkvm/cloud-api main branch. ${{ steps.check.outputs.behind }} new commit(s)." \
            --base main \
            --head "$BRANCH"
